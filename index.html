<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Snap - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_22.png">
    <link rel="icon" type="image/png" href="image_22.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .fridge-container { width: 100%; max-width: 420px; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 5px; font-weight: 800; letter-spacing: -1px; }
        .subtitle { color: #999; font-size: 0.85rem; margin-bottom: 25px; }

        /* Drop & Preview Area */
        .drop-zone {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #fafafa;
            border: 2px dashed var(--accent);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }
        .drop-zone.active { border-color: var(--main); background: #f0f0f0; }
        .drop-zone img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .drop-label { color: #aaa; font-size: 0.9rem; font-weight: 600; padding: 20px; }

        /* Color Results */
        .result-section { display: none; width: 100%; text-align: left; }
        .section-label { font-size: 0.75rem; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 10px; }

        /* Picked Color (Hybrid) */
        .picked-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fafafa;
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            border: 1px solid var(--accent);
        }
        .color-preview { width: 50px; height: 50px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); }
        .color-info { flex: 1; }
        .hex-value { font-size: 1.2rem; font-weight: 800; color: var(--main); }

        /* Auto Palette */
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 30px; }
        .palette-item {
            aspect-ratio: 1/1;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.1s;
        }
        .palette-item:active { transform: scale(0.9); }

        /* Feedback Toast */
        #toast {
            position: fixed; bottom: 100px; background: var(--main); color: #fff;
            padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }

        /* Footer */
        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 20px 0; }
        .kofi-btn, .home-btn {
            display: inline-flex; align-items: center; padding: 12px 20px;
            border-radius: var(--radius); font-weight: bold; font-size: 0.9rem; text-decoration: none;
        }
        .kofi-btn { background: var(--main); color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); border: none; cursor: pointer; }
        footer { font-size: 0.75rem; color: #bbb; }
    </style>
</head>
<body>

<div class="fridge-container">
    <h1>Color Snap</h1>
    <p class="subtitle">Extract palette from images instantly.</p>

    <div class="drop-zone" id="dropZone">
        <p class="drop-label" id="dropLabel">Tap to select or drop image<br><span style="font-size: 0.7rem; font-weight: normal;">(You can also tap the image to pick specific color)</span></p>
        <img id="preview" alt="Preview">
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div class="result-section" id="resultSection">
        <p class="section-label">Picked Color (Tap image to change)</p>
        <div class="picked-box" id="pickedBox">
            <div class="color-preview" id="pickedDisplay"></div>
            <div class="color-info">
                <div class="hex-value" id="pickedHex">#000000</div>
            </div>
        </div>

        <p class="section-label">Auto Palette</p>
        <div class="palette-grid" id="paletteGrid"></div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="display:none;">

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">🍵 Support me on Ko-fi</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        afrorakda © 2026
    </footer>
</div>

<div id="toast">Copied!</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const resultSection = document.getElementById('resultSection');
    const pickedDisplay = document.getElementById('pickedDisplay');
    const pickedHex = document.getElementById('pickedHex');
    const paletteGrid = document.getElementById('paletteGrid');
    const toast = document.getElementById('toast');

    // 1. File Selection
    dropZone.onclick = (e) => { if(e.target !== preview) fileInput.click(); };
    fileInput.onchange = (e) => handleImage(e.target.files[0]);

    // 2. Image Handling
    function handleImage(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            preview.src = event.target.result;
            preview.style.display = 'block';
            document.getElementById('dropLabel').style.display = 'none';
            resultSection.style.display = 'block';
            
            preview.onload = () => {
                canvas.width = preview.naturalWidth;
                canvas.height = preview.naturalHeight;
                ctx.drawImage(preview, 0, 0);
                extractPalette();
            };
        };
        reader.readAsDataURL(file);
    }

    // 3. Auto Extract Logic (A)
    function extractPalette() {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const colorCounts = {};
        const step = 20; // Skip pixels for speed

        for (let i = 0; i < data.length; i += 4 * step) {
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            // Simplify color to reduce noise
            const hex = rgbToHex(Math.round(r/10)*10, Math.round(g/10)*10, Math.round(b/10)*10);
            colorCounts[hex] = (colorCounts[hex] || 0) + 1;
        }

        const sorted = Object.keys(colorCounts).sort((a, b) => colorCounts[b] - colorCounts[a]);
        renderPalette(sorted.slice(0, 5));
        updatePicked(sorted[0]); // Default pick to most frequent
    }

    function renderPalette(colors) {
        paletteGrid.innerHTML = '';
        colors.forEach(hex => {
            const div = document.createElement('div');
            div.className = 'palette-item';
            div.style.background = hex;
            div.onclick = () => copyHex(hex);
            paletteGrid.appendChild(div);
        });
    }

    // 4. Point Picker Logic (B)
    preview.onclick = (e) => {
        const rect = preview.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (preview.naturalWidth / rect.width);
        const y = (e.clientY - rect.top) * (preview.naturalHeight / rect.height);
        
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
        updatePicked(hex);
        copyHex(hex);
    };

    function updatePicked(hex) {
        pickedDisplay.style.background = hex;
        pickedHex.textContent = hex.toUpperCase();
    }

    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
    }

    function copyHex(hex) {
        navigator.clipboard.writeText(hex.toUpperCase());
        showToast(`Copied: ${hex.toUpperCase()}`);
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }
</script>

</body>
</html>
